teepee:
  name: teepee-demo
  language: en

providers:
  claude:
    command: "claude -p --permission-mode bypassPermissions --dangerously-skip-permissions"
    timeout_seconds: 900
  codex:
    command: "codex exec --dangerously-bypass-approvals-and-sandbox"
    timeout_seconds: 900

agents:
  coder:
    provider: claude
  reviewer:
    provider: claude
  architect:
    provider: codex
  devops:
    provider: codex
