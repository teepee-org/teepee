teepee:
  name: teepee-demo
  language: en

providers:
  claude:
    command: "claude -p --permission-mode acceptEdits"
    timeout_seconds: 300
  codex:
    command: "codex exec"
    timeout_seconds: 120

agents:
  coder:
    provider: claude
  reviewer:
    provider: claude
  architect:
    provider: codex
