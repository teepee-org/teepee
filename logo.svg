<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Moon crescent -->
  <path
    fill="#f5d442"
    fill-rule="evenodd"
    d="M84 18A10 10 0 1 1 64 18A10 10 0 1 1 84 18ZM88 16A9 9 0 1 0 70 16A9 9 0 1 0 88 16Z"
  />

  <!-- Teepee body - 3D effect with two faces -->
  <!-- Left face (darker) -->
  <polygon points="50,15 15,85 50,85" fill="#2d7a3a"/>
  <!-- Right face (lighter) -->
  <polygon points="50,15 85,85 50,85" fill="#3da64e"/>

  <!-- Poles sticking out top -->
  <line x1="50" y1="15" x2="43" y2="5" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="15" x2="50" y2="3" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="15" x2="57" y2="5" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Door opening -->
  <path d="M44,85 Q44,65 50,58 Q56,65 56,85" fill="#1a3d20"/>

  <!-- Decorative zigzag band -->
  <polyline points="25,55 30,50 35,55 40,50 45,55 50,50 55,55 60,50 65,55 70,50 75,55"
            fill="none" stroke="#f5d442" stroke-width="1.5" opacity="0.7"/>

  <!-- Ground line -->
  <line x1="10" y1="85" x2="90" y2="85" stroke="#2d5a1a" stroke-width="2"/>
</svg>
